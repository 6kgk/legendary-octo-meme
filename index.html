<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>短信</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="phone-frame">
        <div class="status-bar">
            <span class="status-time">9:41</span>
            <div class="status-icons">
                <svg class="signal-icon" viewBox="0 0 24 24" width="16" height="16">
                    <rect x="2" y="14" width="3" height="6" rx="0.5" fill="currentColor"/>
                    <rect x="7" y="11" width="3" height="9" rx="0.5" fill="currentColor"/>
                    <rect x="12" y="8" width="3" height="12" rx="0.5" fill="currentColor"/>
                    <rect x="17" y="5" width="3" height="15" rx="0.5" fill="currentColor"/>
                </svg>
                <svg class="wifi-icon" viewBox="0 0 24 24" width="16" height="16">
                    <path d="M12 18c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm-6-4l1.4 1.4C8.6 14.2 10.2 13.5 12 13.5s3.4.7 4.6 1.9L18 14c-1.6-1.6-3.8-2.5-6-2.5s-4.4.9-6 2.5zm-4-4l1.4 1.4C5.4 11.6 8.5 10.5 12 10.5s6.6 1.1 8.6 3.1L22 12c-2.4-2.4-5.9-4-10-4S4.4 9.6 2 12z" fill="currentColor"/>
                </svg>
                <svg class="battery-icon" viewBox="0 0 24 24" width="18" height="18">
                    <rect x="1" y="7" width="18" height="10" rx="2" stroke="currentColor" stroke-width="1.5" fill="none"/>
                    <rect x="20" y="10" width="2" height="4" rx="0.5" fill="currentColor"/>
                    <rect x="3" y="9" width="14" height="6" rx="1" fill="currentColor" opacity="0.8"/>
                </svg>
            </div>
        </div>

        <div class="notch"></div>

        <div class="app-screen">
            <!-- 聊天列表页 -->
            <div id="page-chat-list" class="page active">
                <div class="nav-bar">
                    <div class="nav-title">短信</div>
                    <button class="nav-btn compose-btn" onclick="showCompose()">
                        <svg viewBox="0 0 24 24" width="22" height="22">
                            <path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zM20.71 7.04c.39-.39.39-1.02 0-1.41l-2.34-2.34c-.39-.39-1.02-.39-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z" fill="currentColor"/>
                        </svg>
                    </button>
                </div>
                <div class="search-bar">
                    <svg viewBox="0 0 24 24" width="16" height="16">
                        <path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z" fill="currentColor"/>
                    </svg>
                    <input type="text" placeholder="搜索" oninput="filterChats(this.value)">
                </div>
                <div class="chat-list" id="chat-list"></div>
            </div>

            <!-- 聊天详情页 -->
            <div id="page-chat-detail" class="page">
                <div class="nav-bar">
                    <button class="nav-btn back-btn" onclick="goBack()">
                        <svg viewBox="0 0 24 24" width="24" height="24">
                            <path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z" fill="currentColor"/>
                        </svg>
                    </button>
                    <div class="chat-header-info" onclick="showContactInfo()">
                        <div class="chat-header-avatar" id="detail-avatar"></div>
                        <div>
                            <div class="chat-header-name" id="detail-name"></div>
                            <div class="chat-header-status" id="detail-status">在线</div>
                        </div>
                    </div>
                    <button class="nav-btn" onclick="showContactInfo()">
                        <svg viewBox="0 0 24 24" width="22" height="22">
                            <path d="M12 8c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2zm0 2c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm0 6c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2z" fill="currentColor"/>
                        </svg>
                    </button>
                </div>
                <div class="messages-container" id="messages-container">
                    <div class="messages-date-divider" id="date-divider"></div>
                    <div class="messages-list" id="messages-list"></div>
                </div>
                <div class="input-bar">
                    <button class="input-btn plus-btn">
                        <svg viewBox="0 0 24 24" width="24" height="24">
                            <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm5 11h-4v4h-2v-4H7v-2h4V7h2v4h4v2z" fill="currentColor"/>
                        </svg>
                    </button>
                    <div class="input-wrapper">
                        <input type="text" class="message-input" placeholder="短信" id="message-input">
                        <button class="input-btn emoji-btn">
                            <svg viewBox="0 0 24 24" width="22" height="22">
                                <path d="M11.99 2C6.47 2 2 6.48 2 12s4.47 10 9.99 10C17.52 22 22 17.52 22 12S17.52 2 11.99 2zM12 20c-4.42 0-8-3.58-8-8s3.58-8 8-8 8 3.58 8 8-3.58 8-8 8zm3.5-9c.83 0 1.5-.67 1.5-1.5S16.33 8 15.5 8 14 8.67 14 9.5s.67 1.5 1.5 1.5zm-7 0c.83 0 1.5-.67 1.5-1.5S9.33 8 8.5 8 7 8.67 7 9.5 7.67 11 8.5 11zm3.5 6.5c2.33 0 4.31-1.46 5.11-3.5H6.89c.8 2.04 2.78 3.5 5.11 3.5z" fill="currentColor"/>
                            </svg>
                        </button>
                    </div>
                    <button class="send-btn" onclick="sendMessage()">
                        <svg viewBox="0 0 24 24" width="22" height="22">
                            <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z" fill="currentColor"/>
                        </svg>
                    </button>
                </div>
            </div>
        </div>

        <div class="home-indicator"></div>
    </div>

    <script src="app.js"></script>
</body>
</html>
