<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="短信">
    <meta name="theme-color" content="#F2F2F7">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon-192.png">
    <title>短信</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="phone-frame">
        <div class="status-bar">
            <span class="status-time">9:41</span>
            <div class="status-icons">
                <svg viewBox="0 0 18 12" width="18" height="12"><rect x="0" y="7" width="3" height="5" rx="0.5" fill="currentColor"/><rect x="5" y="5" width="3" height="7" rx="0.5" fill="currentColor"/><rect x="10" y="3" width="3" height="9" rx="0.5" fill="currentColor"/><rect x="15" y="0" width="3" height="12" rx="0.5" fill="currentColor"/></svg>
                <svg viewBox="0 0 16 12" width="16" height="12"><path d="M8 2.5c-1.7 0-3.3.5-4.7 1.5l.9 1.1C5.3 4.1 6.6 3.6 8 3.6s2.7.5 3.8 1.5l.9-1.1C11.3 3 9.7 2.5 8 2.5zm-6 3l.9 1.1C4 5.6 5.9 4.9 8 4.9s4 .7 5.1 1.7l.9-1.1C12.5 4.2 10.3 3.5 8 3.5S3.5 4.2 2 5.5zM8 8c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2z" fill="currentColor"/></svg>
                <svg viewBox="0 0 25 12" width="27" height="12"><rect x="0.5" y="0.5" width="21" height="11" rx="2.5" stroke="currentColor" stroke-width="1" fill="none"/><rect x="23" y="4" width="1.5" height="4" rx="0.5" fill="currentColor" opacity="0.4"/><rect x="2" y="2" width="18" height="8" rx="1.5" fill="currentColor" opacity="0.8"/></svg>
            </div>
        </div>
        <div class="app-screen">

            <!-- 聊天列表页 -->
            <div id="page-list" class="page active">
                <div class="nav-bar">
                    <button class="nav-edit-btn">编辑</button>
                    <div class="nav-title-area">
                        <span class="nav-title">短信</span>
                    </div>
                    <button class="nav-compose-btn" title="新信息">
                        <svg viewBox="0 0 24 24" width="24" height="24"><path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zM20.71 7.04c.39-.39.39-1.02 0-1.41l-2.34-2.34c-.39-.39-1.02-.39-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z" fill="currentColor"/></svg>
                    </button>
                </div>
                <div class="search-bar-container">
                    <div class="search-bar">
                        <svg viewBox="0 0 24 24" width="16" height="16" class="search-icon"><path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z" fill="currentColor"/></svg>
                        <input type="text" placeholder="搜索" id="search-input">
                    </div>
                </div>
                <div class="chat-list" id="chat-list"></div>
            </div>

            <!-- 聊天详情页 -->
            <div id="page-detail" class="page">
                <div class="nav-bar detail-nav">
                    <button class="nav-back-btn" onclick="goBack()">
                        <svg viewBox="0 0 13 20" width="13" height="20"><path d="M11 2L3 10l8 8" stroke="#007AFF" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/></svg>
                    </button>
                    <div class="detail-header">
                        <div class="detail-avatar" id="detail-avatar"></div>
                        <div class="detail-info">
                            <span class="detail-name" id="detail-name"></span>
                            <span class="detail-status" id="detail-status"></span>
                        </div>
                    </div>
                    <div class="detail-actions">
                        <button class="detail-action-btn">
                            <svg viewBox="0 0 24 24" width="22" height="22"><path d="M6.62 10.79c1.44 2.83 3.76 5.14 6.59 6.59l2.2-2.2c.27-.27.67-.36 1.02-.24 1.12.37 2.33.57 3.57.57.55 0 1 .45 1 1V20c0 .55-.45 1-1 1-9.39 0-17-7.61-17-17 0-.55.45-1 1-1h3.5c.55 0 1 .45 1 1 0 1.25.2 2.45.57 3.57.11.35.03.74-.25 1.02l-2.2 2.2z" fill="currentColor"/></svg>
                        </button>
                    </div>
                </div>

                <div class="messages-container" id="messages-container">
                    <div class="messages-list" id="messages-list"></div>
                </div>

                <div class="input-bar">
                    <button class="input-ap-btn" onclick="toggleAppPicker()">
                        <svg viewBox="0 0 24 24" width="26" height="26"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm5 11h-4v4h-2v-4H7v-2h4V7h2v4h4v2z" fill="currentColor"/></svg>
                    </button>
                    <div class="input-field-wrapper">
                        <input type="text" class="message-input" id="message-input" placeholder="短信" oninput="onInputChange()" onkeydown="if(event.key==='Enter')sendMessage()">
                    </div>
                    <button class="input-emoji-btn" onclick="toggleEmojiPicker()">
                        <svg viewBox="0 0 24 24" width="26" height="26"><path d="M11.99 2C6.47 2 2 6.48 2 12s4.47 10 9.99 10C17.52 22 22 17.52 22 12S17.52 2 11.99 2zM12 20c-4.42 0-8-3.58-8-8s3.58-8 8-8 8 3.58 8 8-3.58 8-8 8zm3.5-9c.83 0 1.5-.67 1.5-1.5S16.33 8 15.5 8 14 8.67 14 9.5s.67 1.5 1.5 1.5zm-7 0c.83 0 1.5-.67 1.5-1.5S9.33 8 8.5 8 7 8.67 7 9.5 7.67 11 8.5 11zm3.5 6.5c2.33 0 4.31-1.46 5.11-3.5H6.89c.8 2.04 2.78 3.5 5.11 3.5z" fill="currentColor"/></svg>
                    </button>
                    <button class="send-btn" id="send-btn" disabled onclick="sendMessage()">
                        <svg viewBox="0 0 24 24" width="20" height="20"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z" fill="currentColor"/></svg>
                    </button>
                </div>

                <!-- 表情选择器 -->
                <div class="emoji-picker" id="emoji-picker">
                    <div class="emoji-grid" id="emoji-grid"></div>
                    <div class="emoji-categories">
                        <button class="emoji-cat-btn active" data-cat="faces">😀</button>
                        <button class="emoji-cat-btn" data-cat="gestures">👍</button>
                        <button class="emoji-cat-btn" data-cat="nature">🌿</button>
                        <button class="emoji-cat-btn" data-cat="food">🍔</button>
                        <button class="emoji-cat-btn" data-cat="objects">💡</button>
                        <button class="emoji-cat-btn" data-cat="symbols">❤️</button>
                        <button class="emoji-cat-btn" data-cat="flags">🏁</button>
                        <button class="emoji-cat-btn" data-cat="back">
                            <svg viewBox="0 0 24 24" width="20" height="20"><path d="M17.62 6.62l-1.24-1.24L9 12.76l7.38 7.38 1.24-1.24L11.48 12.76z" fill="currentColor"/></svg>
                        </button>
                    </div>
                </div>
            </div>

        </div>
        <div class="home-indicator"></div>
    </div>

    <script src="app.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }
    </script>
</body>
</html>
