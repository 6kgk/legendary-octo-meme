<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="短信">
    <meta name="theme-color" content="#ffffff">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon-192.png">
    <title>短信</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="phone-frame">
        <div class="status-bar">
            <span class="status-time">19:39</span>
            <div class="status-icons">
                <svg viewBox="0 0 18 12" width="18" height="12"><rect x="0" y="7" width="3" height="5" rx="0.5" fill="currentColor"/><rect x="5" y="5" width="3" height="7" rx="0.5" fill="currentColor"/><rect x="10" y="3" width="3" height="9" rx="0.5" fill="currentColor"/><rect x="15" y="0" width="3" height="12" rx="0.5" fill="currentColor"/></svg>
                <svg viewBox="0 0 16 12" width="16" height="12"><path d="M8 2.5c-1.7 0-3.3.5-4.7 1.5l.9 1.1C5.3 4.1 6.6 3.6 8 3.6s2.7.5 3.8 1.5l.9-1.1C11.3 3 9.7 2.5 8 2.5zm-6 3l.9 1.1C4 5.6 5.9 4.9 8 4.9s4 .7 5.1 1.7l.9-1.1C12.5 4.2 10.3 3.5 8 3.5S3.5 4.2 2 5.5zM8 8c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2z" fill="currentColor"/></svg>
                <svg viewBox="0 0 25 12" width="27" height="12"><rect x="0.5" y="0.5" width="21" height="11" rx="2.5" stroke="currentColor" stroke-width="1" fill="none"/><rect x="23" y="4" width="1.5" height="4" rx="0.5" fill="currentColor" opacity="0.4"/><rect x="2" y="2" width="18" height="8" rx="1.5" fill="currentColor" opacity="0.8"/></svg>
            </div>
        </div>

        <div class="app-screen">
            <div class="nav-bar">
                <button class="nav-back-btn">
                    <svg viewBox="0 0 13 20" width="13" height="20"><path d="M11 2L3 10l8 8" stroke="#007AFF" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/></svg>
                    <span class="nav-back-label">短信</span>
                </button>
                <div class="nav-title-area">
                    <span class="nav-title">EX</span>
                </div>
                <div class="nav-right-spacer"></div>
            </div>

            <div class="messages-container">
                <div class="date-divider"><span class="date-divider-text">2026年2月25日</span></div>

                <div class="message received first-in-group">
                    <div class="bubble">我对这个男的是真心我不管他有没有钱</div>
                </div>

                <div class="message received last-in-group has-tail">
                    <div class="bubble">对你只是圈</div>
                </div>

                <div class="message sent has-tail">
                    <div class="bubble">好吧</div>
                </div>

                <div class="read-receipt">
                    <span class="read-receipt-text">已读</span>
                    <span class="read-receipt-time">19:39</span>
                </div>
            </div>

            <div class="input-bar">
                <button class="input-ap-btn">
                    <svg viewBox="0 0 24 24" width="24" height="24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm5 11h-4v4h-2v-4H7v-2h4V7h2v4h4v2z" fill="currentColor"/></svg>
                </button>
                <div class="input-field">
                    <span class="placeholder">短信</span>
                </div>
                <button class="send-btn" disabled>
                    <svg viewBox="0 0 24 24" width="20" height="20"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z" fill="currentColor"/></svg>
                </button>
            </div>
        </div>

        <div class="home-indicator"></div>
    </div>
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }
    </script>
</body>
</html>
