name: Build APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: '3.24.0'

      - name: Install dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release

      - name: Upload Frontend APK
        uses: actions/upload-artifact@v4
        with:
          name: yuezhitong-app-${{ github.run_number }}
          path: src/frontend/build/app/outputs/flutter-apk/app-release.apk

  build-admin:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/admin_app
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: '3.24.0'

      - name: Install dependencies
        run: flutter pub get

      - name: Build Admin APK
        run: flutter build apk --release

      - name: Upload Admin APK
        uses: actions/upload-artifact@v4
        with:
          name: yuezhitong-admin-${{ github.run_number }}
          path: src/admin_app/build/app/outputs/flutter-apk/app-release.apk

  release:
    needs: [build-frontend, build-admin]
    runs-on: ubuntu-latest
    if: always() && needs.build-frontend.result == 'success' && github.event_name == 'push'
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: yuezhitong-app-${{ github.run_number }}
          path: artifacts/frontend

      - uses: actions/download-artifact@v4
        if: needs.build-admin.result == 'success'
        with:
          name: yuezhitong-admin-${{ github.run_number }}
          path: artifacts/admin
        continue-on-error: true

      - name: Rename APKs
        run: |
          mv artifacts/frontend/app-release.apk artifacts/yuezhitong-app.apk
          if [ -f artifacts/admin/app-release.apk ]; then
            mv artifacts/admin/app-release.apk artifacts/yuezhitong-admin.apk
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v2.1.${{ github.run_number }}
          name: "YueZhiTong v2.1 Build #${{ github.run_number }}"
          files: |
            artifacts/yuezhitong-app.apk
            artifacts/yuezhitong-admin.apk
          fail_on_unmatched_files: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
