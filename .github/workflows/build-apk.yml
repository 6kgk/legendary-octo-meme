name: Build APK

on:
  push:
    branches: [main, master]
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: '3.24.0'

      - name: Install dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release

      - name: Upload Frontend APK
        uses: actions/upload-artifact@v4
        with:
          name: yuezhitong-app-${{ github.run_number }}
          path: src/frontend/build/app/outputs/flutter-apk/app-release.apk

  build-admin:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/admin_app
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: '3.24.0'

      - name: Install dependencies
        run: flutter pub get

      - name: Build Admin APK
        run: flutter build apk --release

      - name: Upload Admin APK
        uses: actions/upload-artifact@v4
        with:
          name: yuezhitong-admin-${{ github.run_number }}
          path: src/admin_app/build/app/outputs/flutter-apk/app-release.apk

  release:
    needs: [build-frontend, build-admin]
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: yuezhitong-app-${{ github.run_number }}
          path: artifacts/frontend

      - uses: actions/download-artifact@v4
        with:
          name: yuezhitong-admin-${{ github.run_number }}
          path: artifacts/admin

      - name: Rename APKs
        run: |
          mv artifacts/frontend/app-release.apk artifacts/yuezhitong-app.apk
          mv artifacts/admin/app-release.apk artifacts/yuezhitong-admin.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v2.0.${{ github.run_number }}
          name: "粤职通 v2.0 Build #${{ github.run_number }}"
          files: |
            artifacts/yuezhitong-app.apk
            artifacts/yuezhitong-admin.apk
          body: |
            ## 粤职通 v2.0
            
            ### 主应用 (yuezhitong-app.apk)
            - 全新 UI 设计（渐变色 + 卡片式布局）
            - DeepSeek AI 助教（真实大模型驱动）
            - 150 道真题（语文/数学/英语各 50 题）
            - 30 所广东高职院校数据
            - 每日一练 + 错题本 + 收藏夹 + 学习统计
            
            ### 管理后台 (yuezhitong-admin.apk)
            - 仪表盘（数据概览）
            - 题库管理（增删改查 + 筛选）
            - 院校管理
            - 内容审核（帖子审核/删除）
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
